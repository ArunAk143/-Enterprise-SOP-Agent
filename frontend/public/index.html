<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c1222" />
    <meta
      name="description"
      content="OpsMind AI — enterprise SOP assistant with citations and grounded answers."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap"

  <body>
    <div id="cursor-glow" aria-hidden="true"></div>

      <p class="boot-sub" id="boot-msg">

      </p>
      <div class="boot-dots" aria-hidden="true"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <noscript>
      <strong>JavaScript is disabled.</strong> OpsMind AI needs JavaScript enabled. Turn it on for this site and reload.
    </noscript>
